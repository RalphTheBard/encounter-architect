name: Release

# Runs when you push a version tag like v0.1.1.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches module.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(node -p "require('./module.json').version")"
          echo "Tag: $TAG | module.json: $VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (-> $TAG) does not match module.json version $VER. Bump the version, commit, then re-tag."
            exit 1
          fi

      - name: Build module.zip
        run: |
          zip -r module.zip . -x ".git/*" ".github/*" "*.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            module.json module.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
